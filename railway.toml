[build]
builder = "RAILPACK"
buildCommand = "composer install --no-dev --optimize-autoloader && npm install && npm run build && php artisan optimize:clear && php artisan route:cache && php artisan view:cache"

[deploy]
startCommand = "php artisan optimize:clear && php artisan storage:link && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"